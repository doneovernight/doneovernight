<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Secure Checkout | DONEOVERNIGHT</title>
  <link rel="icon" href="/favicon.ico">
  <script src="/assets/first-party-events.js"></script>
  <style>
    :root {
      --bg: #050506;
      --panel: #0d0d10;
      --panel-soft: #141417;
      --line: rgba(255, 255, 255, 0.1);
      --text: #f4f1ea;
      --muted: rgba(244, 241, 234, 0.66);
      --soft: rgba(244, 241, 234, 0.46);
      --accent: #d7ff6f;
      --accent-dark: #151f08;
      --radius: 18px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% -10%, rgba(215, 255, 111, 0.13), transparent 34%),
        linear-gradient(180deg, #08080a 0%, var(--bg) 62%);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; }

    .shell {
      width: min(960px, calc(100% - 40px));
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 44px 0;
    }

    .brand {
      display: inline-flex;
      width: 184px;
      margin-bottom: clamp(52px, 8vw, 92px);
      opacity: 0.94;
    }

    .brand img {
      width: 100%;
      height: auto;
      display: block;
    }

    .kicker {
      margin: 0 0 18px;
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(48px, 8vw, 94px);
      line-height: 0.92;
      letter-spacing: -0.055em;
      font-weight: 760;
    }

    .subtitle {
      margin: 26px 0 0;
      max-width: 620px;
      color: var(--muted);
      font-size: clamp(18px, 2.4vw, 24px);
      line-height: 1.45;
      letter-spacing: -0.015em;
    }

    .card {
      margin-top: clamp(42px, 6vw, 72px);
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.028));
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 32px 90px rgba(0, 0, 0, 0.32);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border-bottom: 1px solid var(--line);
    }

    .item {
      min-height: 132px;
      padding: 24px;
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.018);
    }

    .item:last-child { border-right: 0; }

    .label {
      display: block;
      margin-bottom: 16px;
      color: var(--soft);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .value {
      display: block;
      color: var(--text);
      font-size: 18px;
      line-height: 1.35;
      letter-spacing: -0.01em;
      overflow-wrap: anywhere;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 24px;
    }

    .status {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 24px;
      border-radius: 999px;
      background: var(--accent);
      color: var(--accent-dark);
      text-decoration: none;
      font-size: 14px;
      font-weight: 780;
      letter-spacing: -0.01em;
      white-space: nowrap;
      transition: transform 180ms ease, opacity 180ms ease;
    }

    .button:hover { transform: translateY(-1px); }
    .button[aria-disabled="true"] {
      opacity: 0.48;
      pointer-events: none;
    }

    .error {
      margin-top: 28px;
      color: #ffb4a8;
      font-size: 14px;
      line-height: 1.55;
    }

    @media (max-width: 820px) {
      .shell {
        width: min(100% - 28px, 620px);
        justify-content: flex-start;
        padding: 28px 0 44px;
      }

      .brand {
        width: 152px;
        margin-bottom: 64px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .item {
        min-height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .item:last-child { border-bottom: 0; }

      .actions {
        flex-direction: column;
        align-items: stretch;
      }

      .button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <a class="brand" href="https://doneovernight.com" aria-label="DONEOVERNIGHT">
      <img src="https://doneovernight.com/brand/doneovernight-white.png" alt="DONEOVERNIGHT">
    </a>

    <p class="kicker">Workspace Activation</p>
    <h1>Secure Checkout</h1>
    <p class="subtitle">Approve your execution plan and activate your workspace.</p>

    <section class="card" aria-live="polite">
      <div class="grid">
        <div class="item">
          <span class="label">Investment</span>
          <span class="value" data-investment>Loading</span>
        </div>
        <div class="item">
          <span class="label">Timeline</span>
          <span class="value" data-timeline>Loading</span>
        </div>
        <div class="item">
          <span class="label">Deliverables</span>
          <span class="value" data-deliverables>Loading</span>
        </div>
        <div class="item">
          <span class="label">Reference</span>
          <span class="value" data-reference>Loading</span>
        </div>
      </div>
      <div class="actions">
        <p class="status" data-status>Preparing your secure checkout.</p>
        <a class="button" data-continue href="#" aria-disabled="true">Continue Secure Checkout</a>
      </div>
    </section>
    <p class="error" data-error hidden></p>
  </main>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var taskId = String(params.get("task_id") || params.get("id") || "").trim();
      var token = String(params.get("token") || "").trim();
      var investment = document.querySelector("[data-investment]");
      var timeline = document.querySelector("[data-timeline]");
      var deliverables = document.querySelector("[data-deliverables]");
      var reference = document.querySelector("[data-reference]");
      var status = document.querySelector("[data-status]");
      var error = document.querySelector("[data-error]");
      var button = document.querySelector("[data-continue]");

      function clean(value) {
        return String(value || "").trim();
      }

      function setDisabled(disabled) {
        button.setAttribute("aria-disabled", disabled ? "true" : "false");
      }

      function formatAmount(value) {
        var amount = clean(value);
        if (!amount) return "Not provided";
        return amount.charAt(0) === "€" ? amount : "€" + amount;
      }

      function fail(message) {
        investment.textContent = "Unavailable";
        timeline.textContent = "Unavailable";
        deliverables.textContent = "Unavailable";
        reference.textContent = taskId || "Unavailable";
        status.textContent = "Secure checkout is not available yet.";
        error.hidden = false;
        error.textContent = message || "Open your secure review link again or contact ask@doneovernight.com.";
        setDisabled(true);
      }

      async function load() {
        if (!taskId || !token) {
          fail("This checkout link is missing secure review access.");
          return;
        }

        try {
          var url = new URL("/api/task-submit", window.location.origin);
          url.searchParams.set("intent", "review_state");
          url.searchParams.set("task_id", taskId);
          url.searchParams.set("token", token);
          var response = await fetch(url.toString(), {
            headers: { Accept: "application/json" },
            cache: "no-store"
          });
          var data = await response.json();
          if (!response.ok || data.authorized !== true || !data.review || !data.review.quote?.payment_required) {
            fail("This execution plan is not ready for secure checkout.");
            return;
          }

          var review = data.review;
          var quote = review.quote || {};
          investment.textContent = formatAmount(quote.quote_amount || quote.amount);
          timeline.textContent = clean(quote.delivery_eta) || "To be confirmed";
          deliverables.textContent = clean(review.task_summary || quote.deliverables || quote.quote_note || quote.note) || "Execution plan";
          reference.textContent = clean(review.task_id || taskId);
          status.textContent = "Your workspace activates after checkout is complete.";

          var startUrl = new URL("/api/payment-start", window.location.origin);
          startUrl.searchParams.set("task_id", taskId);
          startUrl.searchParams.set("token", token);
          button.href = startUrl.toString();
          setDisabled(false);

          window.trackEvent?.("secure_checkout_viewed", {
            source: "secure_checkout",
            task_id: taskId,
            reference: taskId
          });
        } catch (loadError) {
          fail("Secure checkout could not be loaded right now.");
        }
      }

      button.addEventListener("click", function (event) {
        if (button.getAttribute("aria-disabled") === "true") {
          event.preventDefault();
          return;
        }
        window.trackEvent?.("secure_checkout_started", {
          source: "secure_checkout",
          task_id: taskId,
          reference: taskId
        });
        window.trackEvent?.("payment_link_clicked", {
          source: "secure_checkout",
          task_id: taskId,
          reference: taskId
        });
      });

      load();
    })();
  </script>
</body>
</html>
