&lt;script&gt;
  (() =&gt; {
    const root = document.getElementById(&#x27;don-motion-system-vis&#x27;);
    const select = root.querySelector(&#x27;#don-state-select&#x27;);
    const duration = root.querySelector(&#x27;#don-duration&#x27;);
    const durationNote = root.querySelector(&#x27;#don-duration-note&#x27;);
    const lock = root.querySelector(&#x27;#don-lock&#x27;);
    const lockNote = root.querySelector(&#x27;#don-lock-note&#x27;);
    const hold = root.querySelector(&#x27;#don-hold&#x27;);
    const holdNote = root.querySelector(&#x27;#don-hold-note&#x27;);
    const detail = root.querySelector(&#x27;#don-selected-detail&#x27;);
    const bars = root.querySelector(&#x27;#don-chart-bars&#x27;);
    const labels = root.querySelector(&#x27;#don-chart-labels&#x27;);
    const grid = root.querySelector(&#x27;#don-chart-grid&#x27;);
    const chartTitle = root.querySelector(&#x27;#don-chart-title&#x27;);
    const chartDesc = root.querySelector(&#x27;#don-chart-desc&#x27;);

    const states = {
      Idle: {
        duration: 1540, durationNote: &#x27;scheduled one-shot&#x27;, lock: &#x27;none&#x27;, lockNote: &#x27;micro-actions eligible&#x27;, hold: &#x27;still&#x27;, holdNote: &#x27;random quiet window&#x27;,
        detail: &#x27;Idle remains still between randomized breath opportunities.&#x27;,
        phases: [[&#x27;prep&#x27;, 180], [&#x27;inhale&#x27;, 220], [&#x27;peak&#x27;, 320], [&#x27;return&#x27;, 260], [&#x27;settle&#x27;, 560]]
      },
      Hover: {
        duration: 1185, durationNote: &#x27;exactly 3 jumps&#x27;, lock: &#x27;body&#x27;, lockNote: &#x27;6000 ms cooldown&#x27;, hold: &#x27;one shot&#x27;, holdNote: &#x27;exit/re-entry required&#x27;,
        detail: &#x27;Hover has three descending apexes: −7 px, −6 px, and −5 px.&#x27;,
        phases: [[&#x27;stable&#x27;, 60], [&#x27;prep&#x27;, 80], [&#x27;jump 1&#x27;, 150], [&#x27;land&#x27;, 80], [&#x27;jump 2&#x27;, 140], [&#x27;land&#x27;, 80], [&#x27;jump 3&#x27;, 205], [&#x27;land&#x27;, 90], [&#x27;recover&#x27;, 300]]
      },
      Thinking: {
        duration: 760, durationNote: &#x27;entry then hold&#x27;, lock: &#x27;soft&#x27;, lockNote: &#x27;safe authored exit&#x27;, hold: &#x27;semantic&#x27;, holdNote: &#x27;rare eye micro-glance&#x27;,
        detail: &#x27;Thinking tilts the head by one pixel, then becomes still.&#x27;,
        phases: [[&#x27;source&#x27;, 120], [&#x27;eyes&#x27;, 140], [&#x27;tilt&#x27;, 180], [&#x27;settle&#x27;, 320]]
      },
      Typing: {
        duration: 620, durationNote: &#x27;one hand pair&#x27;, lock: &#x27;pair&#x27;, lockNote: &#x27;450–1100 ms pause&#x27;, hold: &#x27;paused&#x27;, holdNote: &#x27;blink only in pause&#x27;,
        detail: &#x27;Typing alternates one-pixel hand motion and always inserts a randomized pause.&#x27;,
        phases: [[&#x27;ready&#x27;, 90], [&#x27;left&#x27;, 100], [&#x27;center&#x27;, 90], [&#x27;right&#x27;, 110], [&#x27;body&#x27;, 90], [&#x27;hold&#x27;, 140]]
      },
      Listening: {
        duration: 900, durationNote: &#x27;entry then hold&#x27;, lock: &#x27;soft&#x27;, lockNote: &#x27;no repeated nod&#x27;, hold: &#x27;still&#x27;, holdNote: &#x27;after entry&#x27;,
        detail: &#x27;Listening performs one subtle tilt and then holds.&#x27;,
        phases: [[&#x27;source&#x27;, 140], [&#x27;anticipate&#x27;, 180], [&#x27;tilt&#x27;, 260], [&#x27;settle&#x27;, 320]]
      },
      Speaking: {
        duration: 2340, durationNote: &#x27;nominal cadence&#x27;, lock: &#x27;soft&#x27;, lockNote: &#x27;no mouth animation&#x27;, hold: &#x27;1400–2400&#x27;, holdNote: &#x27;between eye cadences&#x27;,
        detail: &#x27;Speaking uses rare eye softening while the body remains still.&#x27;,
        phases: [[&#x27;neutral&#x27;, 140], [&#x27;soften&#x27;, 120], [&#x27;return&#x27;, 180], [&#x27;still hold&#x27;, 1900]]
      },
      Sleep: {
        duration: 5520, durationNote: &#x27;nominal cycle&#x27;, lock: &#x27;soft&#x27;, lockNote: &#x27;wake transition&#x27;, hold: &#x27;slow&#x27;, holdNote: &#x27;eyes remain closed&#x27;,
        detail: &#x27;Sleep breathes slowly; optional Z motion is off by default.&#x27;,
        phases: [[&#x27;still&#x27;, 3000], [&#x27;inhale&#x27;, 420], [&#x27;peak&#x27;, 780], [&#x27;exhale&#x27;, 420], [&#x27;settle&#x27;, 900]]
      },
      Celebrate: {
        duration: 1440, durationNote: &#x27;maximum 2000 ms&#x27;, lock: &#x27;body&#x27;, lockNote: &#x27;major milestone only&#x27;, hold: &#x27;one shot&#x27;, holdNote: &#x27;never loops&#x27;,
        detail: &#x27;Celebrate is a short restrained lift for explicit major milestones.&#x27;,
        phases: [[&#x27;source&#x27;, 120], [&#x27;prep&#x27;, 140], [&#x27;arms&#x27;, 180], [&#x27;lift&#x27;, 220], [&#x27;peak&#x27;, 160], [&#x27;return&#x27;, 180], [&#x27;land&#x27;, 180], [&#x27;recover&#x27;, 260]]
      },
      Success: {
        duration: 840, durationNote: &#x27;one shot&#x27;, lock: &#x27;body&#x27;, lockNote: &#x27;confirmed event only&#x27;, hold: &#x27;settle&#x27;, holdNote: &#x27;return to context&#x27;,
        detail: &#x27;Success uses happy eyes and one one-pixel body lift.&#x27;,
        phases: [[&#x27;source&#x27;, 90], [&#x27;eyes&#x27;, 110], [&#x27;lift&#x27;, 140], [&#x27;peak&#x27;, 120], [&#x27;land&#x27;, 140], [&#x27;settle&#x27;, 240]]
      },
      Working: {
        duration: 2300, durationNote: &#x27;one slow cycle&#x27;, lock: &#x27;soft&#x27;, lockNote: &#x27;laptop required&#x27;, hold: &#x27;900–1800&#x27;, holdNote: &#x27;optional still pause&#x27;,
        detail: &#x27;Working uses long holds, one eye shift, and one hand movement.&#x27;,
        phases: [[&#x27;screen&#x27;, 180], [&#x27;eyes&#x27;, 220], [&#x27;hand&#x27;, 700], [&#x27;still&#x27;, 1200]]
      }
    };

    function svgElement(name, attributes = {}) {
      const element = document.createElementNS(&#x27;http://www.w3.org/2000/svg&#x27;, name);
      Object.entries(attributes).forEach(([key, value]) =&gt; element.setAttribute(key, value));
      return element;
    }

    function renderChart(stateName) {
      const state = states[stateName];
      bars.replaceChildren();
      labels.replaceChildren();
      grid.replaceChildren();

      const left = 28;
      const right = 692;
      const width = right - left;
      const total = state.phases.reduce((sum, phase) =&gt; sum + phase[1], 0);

      for (let tick = 0; tick &lt;= 4; tick += 1) {
        const x = left + width * tick / 4;
        grid.appendChild(svgElement(&#x27;line&#x27;, { x1: x, x2: x, y1: 26, y2: 150, class: &#x27;don-chart-grid-line&#x27; }));
        const text = svgElement(&#x27;text&#x27;, { x, y: 174, class: &#x27;don-chart-muted&#x27;, &#x27;text-anchor&#x27;: tick === 0 ? &#x27;start&#x27; : tick === 4 ? &#x27;end&#x27; : &#x27;middle&#x27; });
        text.textContent = `${Math.round(total * tick / 4)} ms`;
        labels.appendChild(text);
      }

      let elapsed = 0;
      state.phases.forEach((phase, index) =&gt; {
        const x = left + width * elapsed / total;
        const barWidth = Math.max(2, width * phase[1] / total);
        bars.appendChild(svgElement(&#x27;rect&#x27;, { x, y: 56, width: barWidth, height: 54, rx: 4, class: &#x27;don-chart-bar&#x27; }));
        if (barWidth &gt; 54) {
          const text = svgElement(&#x27;text&#x27;, { x: x + barWidth / 2, y: 88, class: &#x27;don-chart-text&#x27;, &#x27;text-anchor&#x27;: &#x27;middle&#x27; });
          text.textContent = phase[0];
          labels.appendChild(text);
        } else {
          const text = svgElement(&#x27;text&#x27;, { x: x + barWidth / 2, y: 136 + (index % 2) * 14, class: &#x27;don-chart-muted&#x27;, &#x27;text-anchor&#x27;: &#x27;middle&#x27; });
          text.textContent = phase[0];
          labels.appendChild(text);
        }
        elapsed += phase[1];
      });

      chartTitle.textContent = `${stateName} sequence timing`;
      chartDesc.textContent = `${stateName} uses ${state.phases.length} timing phases over ${total} milliseconds in the displayed nominal sequence.`;
    }

    function selectState(stateName) {
      const state = states[stateName];
      root.querySelectorAll(&#x27;.don-node&#x27;).forEach((node) =&gt; node.classList.toggle(&#x27;is-selected&#x27;, node.dataset.state === stateName));
      duration.textContent = `${state.duration} ms`;
      durationNote.textContent = state.durationNote;
      lock.textContent = state.lock;
      lockNote.textContent = state.lockNote;
      hold.textContent = state.hold;
      holdNote.textContent = state.holdNote;
      detail.textContent = state.detail;
      renderChart(stateName);
    }

    select.addEventListener(&#x27;change&#x27;, () =&gt; selectState(select.value));
    selectState(&#x27;Idle&#x27;);
  })();
&lt;/script&gt;
