<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>X Content Review · DONEOVERNIGHT Admin</title>
  <link rel="stylesheet" href="/shared.css">
  <style>
    :root { color-scheme: dark; }
    body { margin:0; min-height:100vh; background:#050608; color:#f5f1ea; font-family:Arial,sans-serif; }
    main { max-width:980px; margin:0 auto; padding:40px 22px 80px; }
    .eyebrow { color:#e9c48a; font:11px monospace; letter-spacing:.18em; text-transform:uppercase; }
    h1 { font:400 clamp(34px,6vw,56px)/1.05 Georgia,serif; margin:12px 0; }
    .muted { color:#aaa49a; line-height:1.5; }
    .card { border:1px solid #3b3935; border-radius:10px; background:#111214; padding:22px; margin:18px 0; }
    .gate { max-width:420px; margin:12vh auto; }
    input, textarea, button { font:inherit; }
    input { box-sizing:border-box; width:100%; padding:13px; border:1px solid #4a4740; border-radius:6px; color:#fff; background:#191a1d; margin:12px 0; }
    button { border:1px solid #5c513a; border-radius:6px; padding:10px 13px; color:#ffe5aa; background:#211d14; cursor:pointer; }
    button:hover, button:focus-visible { background:#342b1a; }
    button[disabled] { opacity:.45; cursor:not-allowed; }
    button.danger { border-color:#754949; color:#ffc0c0; background:#271818; }
    .head { display:flex; justify-content:space-between; gap:18px; align-items:start; flex-wrap:wrap; }
    .status { font:12px monospace; color:#e9c48a; }
    .meta { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin:18px 0; }
    .meta div { border-left:2px solid #4b463a; padding-left:10px; }
    .meta span { display:block; color:#aaa49a; font-size:11px; text-transform:uppercase; letter-spacing:.08em; }
    .post { white-space:pre-wrap; font-size:17px; line-height:1.55; padding:16px; border-radius:7px; background:#191a1d; }
    .actions { display:flex; gap:9px; flex-wrap:wrap; margin-top:18px; }
    a { color:#f1cf8d; word-break:break-word; }
    #error { color:#ffb3b3; min-height:1.3em; }
    #app { display:none; }
  </style>
</head>
<body>
  <main>
    <section id="gate" class="card gate">
      <div class="eyebrow">DONEOVERNIGHT · protected review</div>
      <h1>X Content</h1>
      <p class="muted">Use the existing admin key. Draft data is requested only after server-side authorization.</p>
      <form id="login"><input id="key" type="password" autocomplete="current-password" placeholder="Admin key" required><button>Open review queue</button></form>
      <p id="error" role="alert"></p>
    </section>
    <section id="app">
      <div class="head"><div><div class="eyebrow">DONEOVERNIGHT · X content</div><h1>Review queue</h1><p class="muted">Approve only marks a draft approved. Publishing requires the separate typed confirmation.</p></div><button id="logout">Log out</button></div>
      <p id="summary" class="status"></p>
      <div id="drafts"></div>
    </section>
  </main>
  <script>
    const API = '/api/x-content-admin'; const KEY = 'doneovernight_admin_key';
    const gate = document.querySelector('#gate'), app = document.querySelector('#app'), error = document.querySelector('#error'), drafts = document.querySelector('#drafts'), summary = document.querySelector('#summary');
    const escapeHtml = (value='') => String(value).replace(/[&<>'"]/g, (char) => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
    const date = (value) => value ? new Date(value).toLocaleString() : 'Unavailable';
    async function request(action, fields={}) {
      const response = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json','Accept':'application/json'}, cache:'no-store', body:JSON.stringify({ admin_key:sessionStorage.getItem(KEY)||'', action, ...fields }) });
      const data = await response.json().catch(() => ({}));
      if (!response.ok || !data.success) { if (response.status === 401) sessionStorage.removeItem(KEY); throw new Error(data.error || 'Request failed'); }
      return data.result;
    }
    const score = (value) => value === null || value === undefined ? '—' : `${Math.round(Number(value) * 100)}%`;
    function render(rows) {
      summary.textContent = `${rows.length} reviewable draft${rows.length === 1 ? '' : 's'} · approve mode required`;
      drafts.innerHTML = rows.length ? rows.map((draft) => { const replies = (draft.reply_suggestions || []).map((reply) => `<li><strong>${escapeHtml(reply.classification)}</strong> · ${escapeHtml(reply.text)} <span class="muted">(${score(reply.confidence)})</span></li>`).join(''); return `<article class="card"><div class="head"><strong>${escapeHtml(draft.status.toUpperCase())}</strong><span class="status">${escapeHtml(draft.id)}</span></div><div class="post">${escapeHtml(draft.text)}</div><div class="meta"><div><span>Weighted X length</span><strong>${escapeHtml(draft.weighted_character_count)} / 240</strong></div><div><span>Post type</span><strong>${escapeHtml(draft.post_type)}</strong></div><div><span>Topic</span><strong>${escapeHtml(draft.topic)}</strong></div><div><span>Insight score</span><strong>${score(draft.insight_score)}</strong></div><div><span>Save score</span><strong>${score(draft.save_score)}</strong></div><div><span>Repost score</span><strong>${score(draft.repost_score)}</strong></div><div><span>Educational value</span><strong>${score(draft.educational_score)}</strong></div><div><span>Brand alignment</span><strong>${score(draft.brand_alignment)}</strong></div><div><span>Predicted performance</span><strong>${score(draft.predicted_performance)}</strong></div><div><span>Created</span><strong>${escapeHtml(date(draft.created_at))}</strong></div></div><p class="muted">Source: <a href="${escapeHtml(draft.source_url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(draft.source_title)}</a>${draft.mention_preview ? ` · Mention preview: ${escapeHtml(draft.mention_preview)}` : ''}</p>${replies ? `<div class="muted"><strong>Reply suggestions</strong><ul>${replies}</ul></div>` : ''}<div class="actions">${draft.status === 'queued' ? `<button data-action="approve" data-id="${escapeHtml(draft.id)}">Approve</button><button class="danger" data-action="reject" data-id="${escapeHtml(draft.id)}">Reject</button><button data-action="regenerate" data-id="${escapeHtml(draft.id)}">Regenerate</button>` : `<button class="danger" data-action="publish" data-id="${escapeHtml(draft.id)}">Publish now</button>`}</div></article>`; }).join('') : '<div class="card muted">No queued or approved drafts.</div>';
    }
    async function load() { const result = await request('list'); render(result.drafts || []); }
    async function open() { try { await load(); gate.style.display='none'; app.style.display='block'; error.textContent=''; } catch (err) { error.textContent='Admin access was denied.'; } }
    document.querySelector('#login').addEventListener('submit', async (event) => { event.preventDefault(); sessionStorage.setItem(KEY, document.querySelector('#key').value.trim()); await open(); });
    document.querySelector('#logout').addEventListener('click', () => { sessionStorage.removeItem(KEY); app.style.display='none'; gate.style.display='block'; });
    drafts.addEventListener('click', async (event) => { const button = event.target.closest('button[data-action]'); if (!button) return; const id = button.dataset.id, action = button.dataset.action; try { button.disabled=true; if (action === 'reject') { const reason = prompt('Rejection reason', 'Rejected by operator'); if (reason === null) return; await request('reject',{draft_id:id,reason}); } else if (action === 'regenerate') { if (!confirm('Generate a replacement draft. The current draft will be rejected only if the replacement passes all gates.')) return; await request('regenerate',{draft_id:id}); } else if (action === 'publish') { if (!confirm('This is the first confirmation. Continue to the final typed confirmation?')) return; if (prompt('Type PUBLISH to create a public X post.') !== 'PUBLISH') return; await request('publish_now',{draft_id:id,publish_confirmation:'PUBLISH'}); } else await request('approve',{draft_id:id}); await load(); } catch (err) { alert(err.message); } finally { button.disabled=false; } });
    if (sessionStorage.getItem(KEY)) open();
  </script>
</body>
</html>
