<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="robots" content="noindex,nofollow,noarchive"><meta http-equiv="Cache-Control" content="no-store">
  <title>DONEOVERNIGHT × X</title><link rel="stylesheet" href="/shared.css">
  <style>
    :root{color-scheme:dark;--bg:#070808;--panel:#0e0f10;--line:#292a2a;--soft:#a7a8a5;--ink:#f4f1eb;--amber:#dcc18a;--green:#8eb99a;--red:#db8f8f;--x:#d8d8d4}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 Arial,sans-serif}.gate{max-width:420px;margin:16vh auto;padding:28px;border:1px solid var(--line);background:var(--panel)}.gate h1,.mast h1{font:400 32px/1.05 Georgia,serif;margin:8px 0 12px}.eyebrow,.label{font:10px/1.2 ui-monospace,monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--soft)}input,textarea,select,button{font:inherit}input,textarea,select{width:100%;padding:10px;border:1px solid #3a3b3a;background:#111213;color:var(--ink);border-radius:2px}button{border:1px solid #44443f;background:#171816;color:var(--ink);padding:8px 10px;border-radius:2px;cursor:pointer}button:hover{border-color:var(--amber);background:#211f18}button.danger{color:#ffd0d0;border-color:#754c4c}button.good{color:#c9edd1;border-color:#526e5a}.muted{color:var(--soft)}#app{display:none;min-height:100vh}.shell{display:grid;grid-template-columns:224px minmax(0,1fr)}aside{position:sticky;top:0;height:100vh;padding:26px 16px;border-right:1px solid var(--line);background:#090a0a}.brand{font:400 22px/1 Georgia,serif;margin-bottom:32px}.brand span{color:var(--soft);font:11px ui-monospace,monospace}nav{display:grid;gap:3px}nav button{border:0;background:transparent;color:var(--soft);text-align:left;padding:9px 10px}nav button.active,nav button:hover{background:#171817;color:var(--ink);border-left:2px solid var(--amber)}.nav-foot{position:absolute;bottom:20px;left:16px;right:16px;display:grid;gap:7px}main{min-width:0;padding:28px clamp(18px,4vw,58px) 70px}.mast{display:flex;justify-content:space-between;gap:18px;align-items:start;border-bottom:1px solid var(--line);padding-bottom:20px;margin-bottom:24px}.mast h1{font-size:28px}.state{display:flex;flex-wrap:wrap;gap:6px;justify-content:end}.chip{padding:5px 7px;border:1px solid var(--line);font:10px ui-monospace,monospace;letter-spacing:.08em}.chip.good{border-color:#4a6852;color:var(--green)}.chip.warn{border-color:#6c5c3c;color:var(--amber)}.chip.bad{border-color:#714a4a;color:var(--red)}.view{display:none}.view.active{display:block}.strip{border-top:1px solid var(--line);border-bottom:1px solid var(--line);display:grid;grid-template-columns:repeat(4,minmax(0,1fr));margin:0 0 24px}.strip div{padding:14px 12px;border-right:1px solid var(--line)}.strip strong{display:block;font:400 18px Georgia,serif;margin-top:5px}.section{margin:30px 0}.section-head{display:flex;justify-content:space-between;align-items:end;gap:16px;border-bottom:1px solid var(--line);padding-bottom:9px;margin-bottom:10px}.section-head h2{font:400 20px Georgia,serif;margin:0}.rows{border-top:1px solid var(--line)}.row{display:grid;grid-template-columns:minmax(120px,1.7fr) repeat(3,minmax(70px,.7fr));gap:12px;padding:12px 0;border-bottom:1px solid var(--line);align-items:center}.row strong{font-weight:500}.draft{padding:20px 0;border-bottom:1px solid var(--line)}.draft-top,.actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap}.draft-top{justify-content:space-between}.post{white-space:pre-wrap;font:17px/1.55 Georgia,serif;max-width:760px;margin:15px 0}.facts{display:grid;grid-template-columns:repeat(5,minmax(100px,1fr));gap:10px;border-top:1px solid var(--line);padding-top:12px}.facts b{display:block;font-weight:500}.facts span{display:block;color:var(--soft);font-size:11px}.details{color:var(--soft);font-size:12px;margin:12px 0}.timeline{border-left:1px solid var(--line);padding-left:18px}.timeline article{position:relative;border-bottom:1px solid var(--line);padding:0 0 18px 14px;margin-bottom:18px}.timeline article:before{content:'';position:absolute;left:-23px;top:4px;width:8px;height:8px;background:var(--amber);border-radius:50%}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:10px 8px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top}.table th{color:var(--soft);font:10px ui-monospace,monospace;letter-spacing:.08em;text-transform:uppercase}.empty{padding:26px 0;color:var(--soft);border-bottom:1px solid var(--line)}.notice{padding:11px;border:1px solid #5c513a;color:var(--amber);margin:12px 0}.mobile-nav{display:none}.check{width:auto;accent-color:var(--amber)}.statusline{min-height:1.4em;color:var(--amber)}a{color:var(--amber)}@media(max-width:900px){.shell{grid-template-columns:1fr}aside{display:none}.mobile-nav{display:flex;position:sticky;top:0;z-index:2;overflow:auto;gap:2px;padding:8px;border-bottom:1px solid var(--line);background:#090a0a}.mobile-nav button{white-space:nowrap;border:0;background:transparent;color:var(--soft);padding:8px}.mobile-nav button.active{color:var(--ink);border-bottom:1px solid var(--amber)}main{padding:20px 18px 50px}.strip{grid-template-columns:repeat(2,1fr)}.facts{grid-template-columns:repeat(3,1fr)}}@media(max-width:560px){.mast{display:block}.state{justify-content:start;margin-top:12px}.strip{grid-template-columns:1fr 1fr}.row{grid-template-columns:1fr 1fr}.row>:nth-child(n+4){display:none}.facts{grid-template-columns:repeat(2,1fr)}.post{font-size:16px}.actions button{flex:1 1 auto}}
  </style>
</head>
<body>
  <section id="gate" class="gate"><div class="eyebrow">DONEOVERNIGHT × X · protected</div><h1>Command Center</h1><p class="muted">Operational control for the approval-gated X agent.</p><form id="login"><input id="key" type="password" autocomplete="current-password" placeholder="Admin key" required><button>Open Command Center</button></form><p id="error" class="statusline"></p></section>
  <div id="app"><div class="mobile-nav" id="mobileNav"></div><div class="shell"><aside><div class="brand">DONEOVERNIGHT <span>× X</span></div><nav id="nav"></nav><div class="nav-foot"><button id="refresh">Refresh live data</button><button id="logout">Lock</button></div></aside><main><header class="mast"><div><div class="eyebrow">Command Center</div><h1 id="title">Overview</h1><div id="status" class="statusline"></div></div><div id="state" class="state"></div></header><div id="views"></div></main></div></div>
  <script>
  const API='/api/x-content-admin', KEY='doneovernight_admin_key', views=['Overview','Review Queue','Publish Queue','Performance','Replies','Learning','Sources','System'];let model=null,active='Overview';
  const $=(s)=>document.querySelector(s), esc=(v='')=>String(v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])), date=(v)=>v?new Date(v).toLocaleString():'—', pct=(v)=>v===null||v===undefined?'—':`${Math.round(Number(v)*100)}%`, num=(v)=>v===null||v===undefined?'Unavailable':Number(v).toLocaleString();
  async function request(action,fields={}){const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},credentials:'same-origin',body:JSON.stringify({admin_key:sessionStorage.getItem(KEY)||'',action,...fields})});const d=await r.json().catch(()=>({}));if(!r.ok||!d.success){if(r.status===401)sessionStorage.removeItem(KEY);throw new Error(d.error||'Request failed');}return d.result}
  function nav(){const html=views.map(v=>`<button data-view="${esc(v)}" class="${v===active?'active':''}">${esc(v)}</button>`).join('');$('#nav').innerHTML=html;$('#mobileNav').innerHTML=html;document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{active=b.dataset.view;render()})}
  function state(){const s=model.system||{},a=model.autonomy||{};$('#state').innerHTML=`<span class="chip ${s.autonomy_mode==='shadow'?'warn':''}">${esc((s.autonomy_mode||'shadow').toUpperCase())}</span><span class="chip warn">${esc((s.publish_mode||'approve').toUpperCase())}</span><span class="chip ${s.publish_locked?'bad':'good'}">${s.publish_locked?'PUBLISH LOCKED':'PUBLISH ENABLED'}</span><span class="chip ${a.safe_stop?'bad':'good'}">${a.safe_stop?'SAFE STOP':'HEALTHY'}</span>`}
  const empty=(text)=>`<div class="empty">${esc(text)}</div>`, head=(title,detail='')=>`<div class="section-head"><div><div class="eyebrow">${esc(detail)}</div><h2>${esc(title)}</h2></div></div>`;
  function overview(){const h=model.heartbeat||{},a=model.autonomy||{},d=model.drafts||[],replies=model.reply_drafts||[],next=(a.schedules||[]).find(x=>['shadow','scheduled','delayed'].includes(x.status));const lastError=h.latestError||'No current error';return `<section class="strip"><div><span class="label">Posts today</span><strong>${num(h.postsPublishedToday||0)}</strong></div><div><span class="label">Awaiting review</span><strong>${d.filter(x=>x.status==='queued').length}</strong></div><div><span class="label">Shadow eligible</span><strong>${(a.decisions||[]).filter(x=>x.would_auto_approve).length}</strong></div><div><span class="label">Replies queued</span><strong>${replies.filter(x=>x.status==='queued').length}</strong></div></section><section class="section">${head('System State','production')}<div class="row"><div><strong>Next proposed post</strong><br><span class="muted">${next?esc(next.objective||'Editorial objective'):'No proposal'}</span></div><div>${next?date(next.scheduled_for):'—'}</div><div>${next?esc(next.status):'—'}</div><div>Publish ${model.system.publish_locked?'locked':'enabled'}</div></div><div class="row"><div><strong>X identity</strong></div><div>${model.system.x_identity_configured?'Configured':'Unavailable'}</div><div><strong>Latest discovery</strong></div><div>${date(h.lastSuccessfulDiscovery)}</div></div><div class="row"><div><strong>Latest publication</strong></div><div>${date(h.lastSuccessfulPublication)}</div><div><strong>Latest error</strong></div><div>${esc(lastError)}</div></div></section><section class="section">${head('7-day performance','real persisted analytics')} ${performanceSummary(true)}</section>`}
  function feedbackPicker(action){const list=['Too much summary','No original insight','Too technical','Too generic','Weak hook','Weak ending','Low repost potential','Low save potential','Weak educational value','Poor brand alignment','Too promotional','Wrong source','Topic fatigue','Duplicate idea','Other'];const raw=prompt(`${action}: select one or more reason numbers, comma separated.\n\n${list.map((x,i)=>`${i+1}. ${x}`).join('\n')}`);if(raw===null)return null;const reasons=[...new Set(raw.split(',').map(x=>list[Number(x.trim())-1]).filter(Boolean))];if(!reasons.length)throw Error('Select at least one reason.');const editor_comments=prompt(reasons.includes('Other')?'Notes are required for Other:':'Optional editor notes:')||'';if(reasons.includes('Other')&&!editor_comments.trim())throw Error('Notes are required for Other.');return{reasons,editor_comments}}
  function review(){const rows=model.drafts||[];return `<section class="section">${head('Review Queue','approval required')}<div class="actions"><button data-bulk="bulk_approve">Approve selected</button><button data-bulk="bulk_reject" class="danger">Reject selected</button><button data-bulk="bulk_regenerate">Regenerate selected</button><button data-action="archive_legacy">Archive legacy</button><button data-action="clear_rejected">Clear rejected</button></div>${rows.length?rows.map(d=>`<article class="draft"><div class="draft-top"><label><input class="check selected" type="checkbox" value="${esc(d.id)}"> <span class="label">${esc(d.status)}</span></label><span class="label">${esc(d.id)}</span></div><div class="post">${esc(d.text)}</div><div class="facts"><div><span>Weighted</span><b>${esc(d.weighted_character_count)} / 240</b></div><div><span>Format</span><b>${esc(d.post_type)}</b></div><div><span>Topic</span><b>${esc(d.topic)}</b></div><div><span>Objective</span><b>${esc(d.autonomy?.objective||'—')}</b></div><div><span>Created</span><b>${esc(date(d.created_at))}</b></div><div><span>Insight</span><b>${pct(d.insight_score)}</b></div><div><span>Save</span><b>${pct(d.save_score)}</b></div><div><span>Repost</span><b>${pct(d.repost_score)}</b></div><div><span>Educational</span><b>${pct(d.educational_score)}</b></div><div><span>Brand</span><b>${pct(d.brand_alignment)}</b></div><div><span>Prediction</span><b>${pct(d.predicted_performance)}</b></div><div><span>Approval</span><b>${pct(d.learning?.predicted_approval)}</b></div></div><div class="details">Source: <a href="${esc(d.source_url)}" target="_blank" rel="noopener">${esc(d.source_title)}</a>${d.mention_preview?` · Official mention: ${esc(d.mention_preview)}`:''}<br>Autonomy: ${esc(d.autonomy?.decision||'Not evaluated')} · Blocks: ${esc((d.autonomy?.blocking_thresholds||[]).join(', ')||'None')}<br>Why: ${esc(d.learning?.why_this_exists||'Passed the existing quality and source gates.')}</div><div class="actions">${d.status==='queued'?`<button data-draft="approve" data-id="${esc(d.id)}">Approve</button><button data-draft="reject" data-id="${esc(d.id)}" class="danger">Reject</button><button data-draft="regenerate" data-id="${esc(d.id)}">Regenerate</button><button data-draft="edit" data-id="${esc(d.id)}">Edit</button><button data-draft="schedule" data-id="${esc(d.id)}">Schedule</button>`:''}${d.status==='approved'?`<button data-draft="publish" data-id="${esc(d.id)}" class="danger">Publish now</button>`:''}</div></article>`).join(''):empty('No queued or approved drafts. New eligible drafts will appear here for human review only.')}</section>`}
  function publishQueue(){const schedules=model.autonomy?.schedules||[],drafts=new Map((model.drafts||[]).map(d=>[d.id,d]));return `<section class="section">${head('Publish Queue','chronological proposals')}<div class="timeline">${schedules.length?schedules.map(s=>{const d=drafts.get(s.draft_id)||{};return `<article><div class="draft-top"><strong>${esc(s.status==='shadow'?'SHADOW PROPOSAL':s.status.toUpperCase())}</strong><span class="muted">${date(s.scheduled_for)}</span></div><p>${esc(d.text||'Draft is no longer in the active queue.')}</p><div class="details">Objective: ${esc(s.objective||'—')} · Reason: ${esc(s.reason||'—')} · Cooldown and source-fatigue checks run again before any publish.</div><div class="actions"><button data-schedule="reschedule" data-id="${esc(s.draft_id)}">Reschedule</button><button data-schedule="cancel" data-id="${esc(s.id)}" class="danger">Cancel</button><button data-schedule="review" data-id="${esc(s.draft_id)}">Force human review</button>${d.status==='approved'?`<button data-draft="publish" data-id="${esc(d.id)}" class="danger">Publish manually</button>`:''}</div></article>`}).join(''):empty('No proposed publishing slots. Shadow proposals will appear after the next autonomy cycle.')}</div></section>`}
  function analyticsRows(days){const floor=Date.now()-days*864e5;return (model.analytics||[]).filter(x=>new Date(x.recorded_at).getTime()>=floor)}function performanceSummary(short=false){const a=analyticsRows(7);if(!a.length)return empty('No persisted analytics for this period. X API metrics will appear after the first metric checkpoint.');const sum=(k)=>a.reduce((n,x)=>n+Number(x[k]||0),0);return `<div class="row"><div><strong>Last 7 days</strong></div><div>${num(sum('views'))} impressions</div><div>${num(sum('likes'))} likes · ${num(sum('reposts'))} reposts</div><div>${num(sum('replies'))} replies · ${num(sum('bookmarks'))} bookmarks</div></div>${short?'':`<div class="notice">Profile visits, link clicks, and follower gain are shown only when X returns them.</div>`}`}
  function performance(){const periods=[7,30,3650];return `<section class="section">${head('Performance','persisted X analytics only')}${periods.map(d=>`<div class="section"><div class="eyebrow">Last ${d===3650?'all time':d+' days'}</div>${d===7?performanceSummary():(()=>{const a=analyticsRows(d);return a.length?`<table class="table"><thead><tr><th>Snapshots</th><th>Impressions</th><th>Likes</th><th>Replies</th><th>Reposts</th><th>Quotes</th><th>Bookmarks</th></tr></thead><tbody><tr><td>${a.length}</td><td>${num(a.reduce((n,x)=>n+Number(x.views||0),0))}</td><td>${num(a.reduce((n,x)=>n+Number(x.likes||0),0))}</td><td>${num(a.reduce((n,x)=>n+Number(x.replies||0),0))}</td><td>${num(a.reduce((n,x)=>n+Number(x.reposts||0),0))}</td><td>${num(a.reduce((n,x)=>n+Number(x.quotes||0),0))}</td><td>${num(a.reduce((n,x)=>n+Number(x.bookmarks||0),0))}</td></tr></tbody></table>`:empty('No persisted analytics for this period.')})()}</div>`).join('')}</section>`}
  function replies(){const inbox=model.interactions||[],byInteraction=new Map((model.reply_drafts||[]).map(x=>[x.interaction_id,x]));return `<section class="section">${head('Reply Inbox','never auto-replies')}${inbox.length?inbox.map(i=>{const r=byInteraction.get(i.id);return `<article class="draft"><div class="draft-top"><strong>${esc(i.classification)}</strong><span class="muted">${esc(i.author_username||'Unknown author')} · ${date(i.received_at)}</span></div><div class="post">${esc(i.text)}</div><div class="details">Type: ${esc(i.interaction_type)} · Suggested reply: ${esc(r?.text||'No suggestion yet')} · Risk: ${r?pct(1-Number(r.confidence||0)):'—'}</div><div class="actions">${r?`<button data-reply="reply_approve" data-id="${esc(r.id)}">Approve reply</button><button data-reply="reply_edit" data-id="${esc(r.id)}">Edit</button><button data-reply="reply_reject" data-id="${esc(r.id)}" class="danger">Reject</button><button data-reply="reply_ignore" data-id="${esc(r.id)}">Ignore</button><button data-reply="reply_mark_lead" data-id="${esc(r.id)}">Mark potential lead</button>`:''}${i.author_username?`<a href="https://x.com/${encodeURIComponent(i.author_username)}" target="_blank" rel="noopener">Open on X</a>`:''}</div></article>`}).join(''):empty('No replies, mentions, or quote posts detected.')}</section>`}
  function learning(){const p=model.autonomy?.editor_profile||{},report=(model.autonomy?.weekly_reports||[])[0]?.report||{},e=p.evidence||{};const list=(x)=>Array.isArray(x)&&x.length?x.map(i=>`${i.name||i.reason}: ${i.count??pct(i.approval_rate)}`).join(' · '):'No sufficient sample';return `<section class="section">${head('Learning','auditable DONEOVERNIGHT preferences')}<div class="strip"><div><span class="label">Approval rate</span><strong>${pct(e.approval_rate)}</strong></div><div><span class="label">Feedback events</span><strong>${e.feedback_count||0}</strong></div><div><span class="label">Regeneration rate</span><strong>${pct((e.rejected_count||0)/Math.max(1,e.feedback_count||0))}</strong></div><div><span class="label">Profile version</span><strong>${p.version||'—'}</strong></div></section><div class="row"><div><strong>Top reject reasons</strong></div><div>${esc(list(e.reject_reasons))}</div><div><strong>Strongest formats</strong></div><div>${esc(list(e.formats))}</div></div><div class="row"><div><strong>Best topics</strong></div><div>${esc(list(e.topics))}</div><div><strong>Best sources</strong></div><div>${esc(list(e.sources))}</div></div><div class="notice">${esc((report.recommendations||[]).join(' ')||'No learning update yet. Minimum sample size: 10 published posts.')}</div><p class="muted">Weight-version history is read-only here. Proposed changes are capped at 5% and cannot alter hard safety thresholds or publishing mode.</p></section>`}
  function sources(){const controls=new Map((model.source_controls||[]).map(x=>[x.source_id,x]));return `<section class="section">${head('Sources','known official sources only')}<table class="table"><thead><tr><th>Source</th><th>Publisher</th><th>Last fetch</th><th>Trust</th><th>Control</th></tr></thead><tbody>${(model.sources||[]).map(s=>{const c=controls.get(s.id)||{enabled:true,trust_level:s.confidence};return `<tr><td><a href="${esc(s.source_url)}" target="_blank" rel="noopener">${esc(s.title)}</a><br><span class="muted">${esc(s.evidence_summary||'')}</span></td><td>${esc(s.publisher)}</td><td>${date(s.retrieved_at)}</td><td>${pct(c.trust_level)}</td><td><button data-source="${esc(s.id)}" data-enabled="${c.enabled?'false':'true'}">${c.enabled?'Disable':'Enable'}</button></td></tr>`}).join('')||'<tr><td colspan="5">No persisted sources yet.</td></tr>'}</tbody></table><p class="muted">Browser controls cannot add arbitrary URLs. “Run source now” uses the official source registry through a protected discovery action.</p><button data-action="run_discovery">Run official source discovery</button></section>`}
  function system(){const s=model.system||{},runs=model.runs||[];return `<section class="section">${head('System','production health')}<div class="row"><div><strong>Supabase</strong></div><div>${s.supabase_configured?'Configured':'Unavailable'}</div><div><strong>OpenAI</strong></div><div>${s.openai_configured?'Configured':'Unavailable'}</div></div><div class="row"><div><strong>X OAuth</strong></div><div>${s.x_identity_configured?'Configured':'Unavailable'}</div><div><strong>Refresh</strong></div><div>${s.token_refresh_configured?'Configured':'Unavailable'}</div></div><div class="row"><div><strong>Deployment commit</strong></div><div>${esc(s.deployment_commit||'Unavailable')}</div><div><strong>Scheduler</strong></div><div>${esc(s.scheduler||'Unavailable')}</div></div><div class="actions"><button data-action="run_heartbeat">Run heartbeat</button><button data-action="run_discovery">Run discovery</button><button data-action="run_autonomy">Run autonomy cycle</button><button data-control="x_pause_discovery">Pause discovery</button><button data-control="x_pause_drafting">Pause drafting</button><button data-control="x_pause_reply_sync">Pause reply sync</button><button data-control="x_autonomy_paused">Pause scheduling</button><button data-control="x_autonomy_safe_stop" class="danger">Activate kill switch</button></div><section class="section">${head('Recent runs','audit trail')}<table class="table"><thead><tr><th>Type</th><th>Status</th><th>Started</th><th>Error</th></tr></thead><tbody>${runs.map(r=>`<tr><td>${esc(r.run_type)}</td><td>${esc(r.status)}</td><td>${date(r.started_at)}</td><td>${esc(r.error_message||'—')}</td></tr>`).join('')||'<tr><td colspan="4">No run data available.</td></tr>'}</tbody></table></section></section>`}
  function render(){nav();state();$('#title').textContent=active;const fn={Overview:overview,'Review Queue':review,'Publish Queue':publishQueue,Performance:performance,Replies:replies,Learning:learning,Sources:sources,System:system}[active];$('#views').innerHTML=`<div class="view active">${fn()}</div>`;bind()}
  function selected(){return [...document.querySelectorAll('.selected:checked')].map(x=>x.value)}
  function bind(){document.querySelectorAll('[data-action]').forEach(b=>b.onclick=async()=>{try{b.disabled=true;const a=b.dataset.action;if(a==='archive_legacy'||a==='clear_rejected')await request(a);else await request(a);await load()}catch(e){alert(e.message)}finally{b.disabled=false}});document.querySelectorAll('[data-bulk]').forEach(b=>b.onclick=async()=>{try{const action=b.dataset.bulk,ids=selected();if(!ids.length)throw Error('Select drafts first.');let extra={};if(action!=='bulk_approve'){const f=feedbackPicker(action.replace('bulk_',''));if(!f)return;extra=f}await request(action,{draft_ids:ids,...extra});await load()}catch(e){alert(e.message)}});document.querySelectorAll('[data-draft]').forEach(b=>b.onclick=async()=>{try{const id=b.dataset.id,a=b.dataset.draft;if(a==='approve')await request('approve',{draft_id:id});else if(a==='reject'||a==='regenerate'){const f=feedbackPicker(a);if(!f)return;await request(a,{draft_id:id,...f})}else if(a==='edit'){const d=(model.drafts||[]).find(x=>x.id===id),text=prompt('Edit post. All character and editorial gates run again.',d?.text||'');if(text===null)return;await request('edit',{draft_id:id,text})}else if(a==='schedule'){const value=prompt('Future publish time (ISO 8601)',new Date(Date.now()+864e5).toISOString());if(value===null)return;await request('schedule',{draft_id:id,scheduled_for:value})}else if(a==='publish'){if(!confirm('This is the first confirmation. Continue?'))return;if(prompt('Type PUBLISH to create a public X post.')!=='PUBLISH')return;await request('publish_now',{draft_id:id,publish_confirmation:'PUBLISH'})}await load()}catch(e){alert(e.message)}});document.querySelectorAll('[data-schedule]').forEach(b=>b.onclick=async()=>{try{if(b.dataset.schedule==='cancel')await request('autonomy_cancel_schedule',{schedule_id:b.dataset.id});else if(b.dataset.schedule==='review')await request('autonomy_force_review',{draft_id:b.dataset.id});else{const v=prompt('Future publish time (ISO 8601)',new Date(Date.now()+864e5).toISOString());if(v===null)return;await request('schedule',{draft_id:b.dataset.id,scheduled_for:v})}await load()}catch(e){alert(e.message)}});document.querySelectorAll('[data-reply]').forEach(b=>b.onclick=async()=>{try{const a=b.dataset.reply,id=b.dataset.id;if(a==='reply_edit'){const r=(model.reply_drafts||[]).find(x=>x.id===id),text=prompt('Edit reply',r?.text||'');if(text===null)return;await request(a,{reply_draft_id:id,text})}else await request(a,{reply_draft_id:id});await load()}catch(e){alert(e.message)}});document.querySelectorAll('[data-source]').forEach(b=>b.onclick=async()=>{try{await request('source_control',{source_id:b.dataset.source,enabled:b.dataset.enabled==='true'});await load()}catch(e){alert(e.message)}});document.querySelectorAll('[data-control]').forEach(b=>b.onclick=async()=>{try{if(!confirm(`Change ${b.dataset.control}?`))return;await request('system_control',{key:b.dataset.control,value:true});await load()}catch(e){alert(e.message)}})}
  async function load(){model=await request('command_center');$('#status').textContent=`Live production data · refreshed ${new Date().toLocaleTimeString()}`;render()}async function open(){try{await load();$('#gate').style.display='none';$('#app').style.display='block';$('#error').textContent=''}catch(e){$('#error').textContent='Admin access was denied.'}}$('#login').onsubmit=e=>{e.preventDefault();sessionStorage.setItem(KEY,$('#key').value.trim());open()};$('#logout').onclick=()=>{sessionStorage.removeItem(KEY);location.reload()};$('#refresh').onclick=()=>load().catch(e=>alert(e.message));if(sessionStorage.getItem(KEY))open();
  </script>
</body></html>
