<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Route Not Available | DONEOVERNIGHT</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      color-scheme: dark;
      --ink: #f5f0e8;
      --muted: rgba(245, 240, 232, 0.62);
      --line: rgba(245, 240, 232, 0.16);
      --bg: #070707;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 32px;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
    }

    main {
      width: min(100%, 620px);
      padding: clamp(28px, 6vw, 64px);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.025);
    }

    .marker {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(1.8rem, 5vw, 3.6rem);
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1;
      text-transform: uppercase;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main>
    <span class="marker">DONEOVERNIGHT admin-safe fallback marker</span>
    <h1>Admin route not available.</h1>
    <p>This route is protected and cannot fall through to the public website.</p>
  </main>
</body>
</html>
