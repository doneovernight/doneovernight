<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Booking Offline | COMMONPL4CE</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      color-scheme: dark;
      --ink: #f3efe7;
      --muted: rgba(243, 239, 231, 0.68);
      --line: rgba(243, 239, 231, 0.16);
      --bg: #0d0c0a;
      --panel: rgba(243, 239, 231, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 32px;
      background:
        radial-gradient(circle at top left, rgba(219, 202, 173, 0.12), transparent 34rem),
        var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 560px);
      padding: clamp(32px, 7vw, 72px);
      border: 1px solid var(--line);
      background: var(--panel);
      text-align: center;
    }

    .marker {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(2.2rem, 8vw, 5.5rem);
      font-weight: 800;
      letter-spacing: 0;
      line-height: 0.94;
      text-transform: uppercase;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      margin-top: 30px;
      padding: 0 22px;
      border: 1px solid rgba(243, 239, 231, 0.28);
      color: var(--ink);
      text-decoration: none;
      text-transform: uppercase;
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    a:hover {
      border-color: rgba(243, 239, 231, 0.52);
      background: rgba(243, 239, 231, 0.06);
    }
  </style>
</head>
<body>
  <main>
    <span class="marker">COMMONPL4CE booking offline marker</span>
    <h1>Booking page temporarily offline.</h1>
    <p>Please visit COMMONPL4CE.</p>
    <a href="/cp">Visit COMMONPL4CE</a>
  </main>
</body>
</html>
