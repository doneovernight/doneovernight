name: X content schedule

on:
  schedule:
    - cron: "0 */2 * * *"
    - cron: "*/15 * * * *"
    # One of these is 08:00 Europe/Amsterdam across CET/CEST; the route checks local time.
    - cron: "0 6,7 * * *"
    - cron: "0 6,7 * * 1"
    - cron: "0 6,7 1 * *"
  workflow_dispatch:
    inputs:
      task:
        description: "Scheduled task to invoke"
        required: true
        type: choice
        options: [discovery, daily_plan, radar, growth, intelligence, daily_brief, executive_report, publishing, identity, oauth_start, regenerate_legacy, autonomy, autonomy_publish, autonomy_publish_diagnostic, autonomy_metrics]
      draft_limit:
        description: "Optional legacy replacement limit (1-5)"
        required: false
        type: string

permissions: {}

concurrency:
  group: x-content-schedule-${{ github.event.schedule || inputs.task }}
  cancel-in-progress: false

jobs:
  daily_plan:
    if: github.event.schedule == '0 6,7 * * *' || inputs.task == 'daily_plan'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Generate and persist the Amsterdam daily autonomous plan
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail-with-body --silent --show-error --retry 2 --retry-all-errors
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-daily-plan

  discovery:
    if: github.event.schedule == '0 */2 * * *' || inputs.task == 'discovery'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Run discovery
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail --silent --show-error --retry 2 --retry-all-errors
          -o /dev/null
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-discover

      - name: Rank the Social Radar
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail --silent --show-error --retry 2 --retry-all-errors
          -o /dev/null
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-radar

      - name: Collect approval-only engagement drafts and analytics
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail --silent --show-error --retry 2 --retry-all-errors
          -o /dev/null
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-engagement

      - name: Run autonomy shadow decisions
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail --silent --show-error --retry 2 --retry-all-errors
          -o /dev/null
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-autonomy

      - name: Collect autonomy metric checkpoints
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail --silent --show-error --retry 2 --retry-all-errors
          -o /dev/null
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-autonomy-metrics

      - name: Run Growth Director in shadow mode
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail --silent --show-error --retry 2 --retry-all-errors
          -o /dev/null
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-growth

  daily_brief:
    if: github.event.schedule == '0 6,7 * * *' || inputs.task == 'daily_brief'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Deliver the quiet Amsterdam daily brief when due
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail --silent --show-error --retry 2 --retry-all-errors
          -o /dev/null
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-daily-brief

  intelligence:
    if: github.event.schedule == '0 6,7 * * 1' || inputs.task == 'intelligence'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Run weekly Growth Intelligence in shadow mode
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail --silent --show-error --retry 2 --retry-all-errors
          -o /dev/null
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-intelligence

  executive_report:
    if: github.event.schedule == '0 6,7 1 * *' || inputs.task == 'executive_report'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Produce monthly executive report when due
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail --silent --show-error --retry 2 --retry-all-errors
          -o /dev/null
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-executive-report

  publishing:
    if: github.event.schedule == '*/15 * * * *' || inputs.task == 'publishing'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Run guarded autonomous publishing check
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail --silent --show-error --retry 2 --retry-all-errors
          -o /dev/null
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-autonomy-publish

  autonomy:
    if: inputs.task == 'autonomy'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Run a shadow decision cycle
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail --silent --show-error --retry 2 --retry-all-errors
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-autonomy

  radar:
    if: inputs.task == 'radar'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Rank the Social Radar
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail --silent --show-error --retry 2 --retry-all-errors
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-radar

  growth:
    if: inputs.task == 'growth'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Run Growth Director in shadow mode
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail --silent --show-error --retry 2 --retry-all-errors
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-growth

  autonomy_publish:
    if: inputs.task == 'autonomy_publish'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Run guarded autonomous publishing check
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail --silent --show-error --retry 2 --retry-all-errors
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-autonomy-publish

  autonomy_publish_diagnostic:
    if: inputs.task == 'autonomy_publish_diagnostic'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Run read-only guarded publishing diagnostic
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail-with-body --silent --show-error
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-autonomy-publish?diagnostic=1

  autonomy_metrics:
    if: inputs.task == 'autonomy_metrics'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Collect autonomy metrics and evaluate learning
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail --silent --show-error --retry 2 --retry-all-errors
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-autonomy-metrics

  identity:
    if: inputs.task == 'identity'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Verify X identity
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail-with-body --silent --show-error
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-verify-identity

  oauth_start:
    if: inputs.task == 'oauth_start'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Start OAuth 2.0 PKCE authorization
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail-with-body --silent --show-error
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-oauth/start

  regenerate_legacy:
    if: inputs.task == 'regenerate_legacy'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Regenerate up to five legacy drafts for approval
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail --silent --show-error --retry 2 --retry-all-errors
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-regenerate-legacy?limit=${{ inputs.draft_limit || '5' }}
