name: X content schedule

on:
  schedule:
    - cron: "0 */2 * * *"
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      task:
        description: "Scheduled task to invoke"
        required: true
        type: choice
        options: [discovery, publishing, identity, oauth_start, regenerate_legacy]
      draft_limit:
        description: "Optional legacy replacement limit (1-5)"
        required: false
        type: string

permissions: {}

concurrency:
  group: x-content-schedule-${{ github.event.schedule || inputs.task }}
  cancel-in-progress: false

jobs:
  discovery:
    if: github.event.schedule == '0 */2 * * *' || inputs.task == 'discovery'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Run discovery
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail --silent --show-error --retry 2 --retry-all-errors
          -o /dev/null
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-discover

      - name: Collect approval-only engagement drafts and analytics
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail --silent --show-error --retry 2 --retry-all-errors
          -o /dev/null
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-engagement

  publishing:
    if: github.event.schedule == '*/15 * * * *' || inputs.task == 'publishing'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Run publishing check
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail --silent --show-error --retry 2 --retry-all-errors
          -o /dev/null
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-publish

  identity:
    if: inputs.task == 'identity'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Verify X identity
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail --silent --show-error
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-verify-identity

  oauth_start:
    if: inputs.task == 'oauth_start'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Start OAuth 2.0 PKCE authorization
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail-with-body --silent --show-error
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-oauth/start

  regenerate_legacy:
    if: inputs.task == 'regenerate_legacy'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Regenerate up to five legacy drafts for approval
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail --silent --show-error --retry 2 --retry-all-errors
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-regenerate-legacy?limit=${{ inputs.draft_limit || '5' }}
