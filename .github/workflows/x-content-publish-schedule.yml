name: X guarded publisher schedule

on:
  schedule:
    # The dedicated workflow keeps publisher delivery independent from the
    # discovery/enrichment cron while retaining the proven 15-minute trigger.
    - cron: "*/15 * * * *"

permissions: {}

concurrency:
  group: x-content-guarded-publisher
  cancel-in-progress: false

jobs:
  publishing:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Run guarded autonomous publishing check
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: >-
          curl --fail-with-body --silent --show-error --retry 2 --retry-all-errors
          -H "Authorization: Bearer ${CRON_SECRET}"
          https://doneovernight.com/api/x-content-autonomy-publish
