<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Task received — DONEOVERNIGHT</title>
<meta name="description" content="Your DONEOVERNIGHT task has been received.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#050608">
<link rel="apple-touch-icon" href="icon-180.png?v=20260428">
<link rel="shortcut icon" href="favicon.png?v=20260428">
<link rel="icon" type="image/png" href="favicon.png?v=20260428">
<link rel="stylesheet" href="shared.css">
<style>
  .thanks-wrap {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 120px 24px 72px;
  }
  .thanks-panel {
    width: min(560px, 100%);
    text-align: center;
  }
  .thanks-panel .eyebrow {
    display: block;
    margin-bottom: 18px;
    color: var(--amber);
  }
  .thanks-panel h1 {
    font-family: var(--serif);
    font-size: clamp(52px, 9vw, 86px);
    line-height: 0.95;
    font-weight: 400;
    letter-spacing: -0.025em;
    margin-bottom: 22px;
  }
  .thanks-panel p {
    color: var(--ink-dim);
    font-size: 16px;
    line-height: 1.65;
    margin: 0 auto 12px;
    max-width: 42ch;
  }
  .thanks-actions {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 34px;
    flex-wrap: wrap;
  }
  .thanks-actions a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 42px;
    padding: 0 18px;
    border-radius: 999px;
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .thanks-actions a.primary {
    color: #050608;
    background: var(--amber);
    border-color: var(--amber);
  }
</style>
</head>
<body>
<div class="page-bg"></div>
<div class="page-stars"></div>
<div class="page-vignette"></div>
<div class="page-grain"></div>

<nav class="nav" aria-label="Primary">
  <a class="logo" href="index.html">DONEOVERNIGHT</a>
  <div class="nav-pill" id="navPill" onclick="if (event.target === this || event.target.closest('.nav-dot')) { event.stopImmediatePropagation(); this.classList.add('is-open'); const d=this.querySelector('.nav-dot'); d && (d.setAttribute('aria-expanded','true'), d.setAttribute('aria-label','Close menu')); }">
    <button class="nav-dot" id="navDot" aria-label="Open menu" aria-expanded="false" aria-controls="navLinks" onclick="event.stopImmediatePropagation(); const p=this.closest('.nav-pill'); p.classList.add('is-open'); this.setAttribute('aria-expanded','true'); this.setAttribute('aria-label','Close menu');"></button>
    <div class="nav-links-wrap" id="navLinks">
      <a href="index.html">Home</a>
      <a href="index.html#proof">Proof</a>
      <a href="trust.html">Trust</a>
      <a href="index.html#pricing">Pricing</a>
      <a href="enterprise.html">Enterprise</a>
      <a href="portal.html">Portal</a>
      <span class="sep"></span>
      <a href="index.html#cta" class="nav-cta">
        <span>Send it tonight</span>
        <span class="arrow">→</span>
      </a>
    </div>
  </div>
</nav>

<main class="thanks-wrap">
  <section class="thanks-panel">
    <span class="eyebrow">Submission received</span>
    <h1>Task received.</h1>
    <p>We'll review it and send a quote within 60 minutes.</p>
    <p>Need to add files? Reply to our email or send them to <a href="mailto:ask@doneovernight.com">ask@doneovernight.com</a>.</p>
    <div class="thanks-actions">
      <a class="primary" href="index.html">Back home</a>
      <a href="mailto:ask@doneovernight.com">Email files</a>
    </div>
  </section>
</main>

<script>
(function() {
  const pill = document.getElementById('navPill');
  const dot = document.getElementById('navDot');
  if (!pill || !dot) return;
  const mqCoarse = window.matchMedia('(hover: none), (pointer: coarse)');
  let isOpen = false;
  let closeTimer = null;
  function open() { if (isOpen) return; isOpen = true; pill.classList.add('is-open'); dot.setAttribute('aria-expanded','true'); }
  function close() { if (!isOpen) return; isOpen = false; pill.classList.remove('is-open'); dot.setAttribute('aria-expanded','false'); }
  if (!mqCoarse.matches) {
    pill.addEventListener('mouseenter', () => { clearTimeout(closeTimer); open(); });
    pill.addEventListener('mouseleave', () => { clearTimeout(closeTimer); closeTimer = setTimeout(close, 220); });
  }
  dot.addEventListener('click', (e) => { e.stopPropagation(); clearTimeout(closeTimer); open(); });
  document.addEventListener('click', (e) => { if (isOpen && !pill.contains(e.target)) close(); });
  pill.addEventListener('click', (e) => { if (e.target.closest('a')) setTimeout(close, 220); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && isOpen) close(); });
})();
</script>
</body>
</html>
