<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>HQ Login | DONEOVERNIGHT</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#050608">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/experience/experience.css">
  <script defer src="/experience/experience.js"></script>
</head>
<body data-platform="hq-login">
  <div class="vignette"></div>
  <div class="grain"></div>
  <main class="hq-login-shell" id="hq-login-root">
    <section class="hq-login-panel" aria-label="DONEOVERNIGHT HQ login">
      <img class="hq-login-logo" src="/brand/doneovernight-white.png" alt="DONEOVERNIGHT">
      <span class="eyebrow">Private Access</span>
      <h1 class="step-title">DONEOVERNIGHT Headquarters</h1>
      <p class="step-copy">Authorized operators only.</p>
      <form class="hq-login-form" id="hq-login-form">
        <label class="field-label">
          Password
          <input class="text-field" name="password" type="password" autocomplete="current-password" inputmode="text" required autofocus>
        </label>
        <button class="quiet-action" type="submit">
          <span data-login-label>Unlock HQ</span>
          <span class="hq-spinner" aria-hidden="true"></span>
        </button>
        <p class="form-note" id="hq-login-note" aria-live="polite"></p>
      </form>
      <footer class="hq-login-footer">
        <span>Unauthorized access is logged.</span>
        <span>Production · main</span>
      </footer>
    </section>
  </main>
</body>
</html>
